name: Compat

# 無制限の Actions（パブリックリポジトリ）を活用した「広い互換マトリクス」＋定期回帰検証。
# ci.yml は PR の高速フィードバック用（ubuntu+windows / Node 22）に絞り、
# こちらは Node 20/22/24 × 3 OS を回して版差・環境差の劣化を早期に検知する。
# 週次スケジュール実行で失敗したら Issue を自動起票（依存更新や上流変更による drift 検知）。

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 00:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/compat.yml'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20', '22', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  notify:
    needs: test
    # スケジュール実行が失敗したときだけ Issue を起票/追記する
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = 'Scheduled compat run failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The scheduled compatibility matrix failed.\n\nRun: ${runUrl}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            }
