name: Verify technique

# PR で demo/ が変更されたら、その変更ぶんを harness（src/cli.ts）で実際に検証し、
# VerifyResult を PR コメントに投稿する。無制限 Actions を活かしたコントリビュータ体験。
# Excel/VBA は CI に Excel が無いためスキップ（結果表に明示）。

on:
  pull_request:
    paths: ['demo/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci

      - id: verify
        continue-on-error: true
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/verify-changed-demos.mjs

      - name: Comment results
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = 'No verification summary was produced.';
            try { body = fs.readFileSync('verify-summary.md', 'utf8'); } catch {}
            const marker = '<!-- verify-technique -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail if any changed technique did not verify
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::error::One or more changed demos did not verify. See the PR comment."
          exit 1
