name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Node + Python + Go + Rust across Linux and Windows. The Excel/VBA COM tests
    # self-skip where Excel isn't available (all CI runners), so they only run on a
    # local Windows machine with Excel installed.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install pytest
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
