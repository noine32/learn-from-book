name: Pages

# ショーケース（site/index.html）を GitHub Pages に公開する。
# PR ではビルド（アーティファクト化）まで行って壊れていないか検証し、
# main への push でのみ実際にデプロイする。パブリックリポジトリなので Actions は無制限。

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  pull_request:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    # PR ではデプロイしない（ビルド検証のみ）
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
